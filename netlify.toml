# ─────────────────────────────────────────────────────────────
# netlify.toml — EroPick デプロイ設定
# ─────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# /api/* → Netlify Functions へのリダイレクト
[[redirects]]
  from   = "/api/fanza-samples"
  to     = "/.netlify/functions/fanza-samples"
  status = 200

[[redirects]]
  from   = "/api/fanza-genres"
  to     = "/.netlify/functions/fanza-genres"
  status = 200

[[redirects]]
  from   = "/api/fanza-floors"
  to     = "/.netlify/functions/fanza-floors"
  status = 200

[[redirects]]
  from   = "/api/health"
  to     = "/.netlify/functions/health"
  status = 200

# SPA フォールバック
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
